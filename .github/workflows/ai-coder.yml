name: Daily AI Code Generator

on:
  schedule:
    - cron: "*/72 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-and-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Create secrets
        run: |
          echo "${{ secrets.GEMINI_COOKIE }}" > cookie.txt
          
          # Optional: provide a default config.json if needed
          cat << 'CONF' > config.json
          {
            "port": 8085,
            "host": "0.0.0.0",
            "retry_attempts": 3,
            "retry_delay_sec": 2,
            "request_timeout_sec": 180,
            "gemini_bl": "boq_assistant-bard-web-server_20260525.09_p0",
            "auth_user": "1",
            "default_model": "gemini-1.5-flash",
            "api_keys": [],
            "cookie_file": "cookie.txt",
            "proxy": null,
            "log_requests": true
          }
          CONF

      - name: Run Arboreta
        run: python main.py

      - name: Read commit message
        id: commit_msg
        run: |
          MSG=$(cat commit_msg.txt)
          echo "message=$MSG" >> $GITHUB_OUTPUT

      - name: Commit and Push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: ${{ steps.commit_msg.outputs.message }}
          branch: main
          file_pattern: "generated_code/*"
          commit_user_name: "Bayazid Sustami"
          commit_user_email: "43400782+bayazidsustami@users.noreply.github.com"
          commit_author: "Bayazid Sustami <43400782+bayazidsustami@users.noreply.github.com>"
