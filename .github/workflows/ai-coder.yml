name: Daily AI Code Generator

on:
  schedule:
    - cron: "*/72 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-and-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install openai

      - name: Run Arboreta
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ vars.OPENAI_BASE_URL || 'https://api.openai.com/v1' }}
          OPENAI_MODEL_NAME: ${{ vars.OPENAI_MODEL_NAME || 'gpt-4o-mini' }}
        run: python main.py

      - name: Read commit message
        id: commit_msg
        run: |
          MSG=$(cat commit_msg.txt)
          echo "message=$MSG" >> $GITHUB_OUTPUT

      - name: Commit and Push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: ${{ steps.commit_msg.outputs.message }}
          branch: main
          file_pattern: "generated_code/*"
          commit_user_name: "Bayazid Sustami"
          commit_user_email: "43400782+bayazidsustami@users.noreply.github.com"
          commit_author: "Bayazid Sustami <43400782+bayazidsustami@users.noreply.github.com>"

